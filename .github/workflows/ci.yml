name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:

jobs:
  build-and-test:
    name: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure
        run: cmake -S . -B build -DULTRAAI_BUILD_TESTS=ON -DULTRAAI_ADAPTER_LOCAL=ON -DULTRAAI_BUILD_EXAMPLES=ON -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release

      - name: Test
        run: ctest --test-dir build --build-config Release --output-on-failure

  no-mock-config:
    name: mock adapters disabled
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure without mock adapters
        run: cmake -S . -B build -DULTRAAI_ADAPTER_MOCK=OFF -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build
